<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Body Measurement System</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.2.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.2.0"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin-bottom: 15px;
        }

        .controls {
            margin-bottom: 15px;
        }

        select, button {
            padding: 12px 20px;
            margin: 5px;
            border-radius: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
        }

        button {
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        button:active {
            background: #0056b3;
        }

        .wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
        }

        video {
            width: 100%;
            max-width: 900px;
            border-radius: 12px;
            background: black;
            display: block;
        }

        .mirror {
            transform: scaleX(-1);
        }

        canvas {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .results {
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .results p {
            margin: 10px 0;
            font-size: 18px;
        }

        .status {
            margin-top: 10px;
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>AI Body Measurement System</h1>

    <div class="controls">
        <select id="cameraSelect"></select>
        <button id="startBtn" onclick="startSelectedCamera()">Start Camera</button>
    </div>

    <div class="wrapper">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="results">
        <p>Height: <span id="height">--</span></p>
        <p>Weight: <span id="weight">--</span></p>
        <p>BMI: <span id="bmi">--</span></p>
        <p>Detection: <span id="personStatus">Waiting...</span></p>
    </div>

    <div class="status" id="status">Initializing...</div>

    <script>
        let detector;
        let currentStream;
        let animationFrameId;

        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const cameraSelect = document.getElementById("cameraSelect");

        async function initSystem() {
            try {
                document.getElementById("status").innerText = "Loading AI Model...";
                await tf.setBackend('webgl');
                detector = await poseDetection.createDetector(
                    poseDetection.SupportedModels.BlazePose,
                    { runtime: 'tfjs', modelType: 'full' }
                );
                document.getElementById("status").innerText = "AI System Ready";
                
                await loadCameras();
            } catch (err) {
                document.getElementById("status").innerText = "Init Failed: " + err.message;
                console.error(err);
            }
        }

        async function loadCameras() {
            try {
                // Request initial permissions to get device labels
                const initStream = await navigator.mediaDevices.getUserMedia({ video: true });
                initStream.getTracks().forEach(track => track.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(d => d.kind === "videoinput");

                cameraSelect.innerHTML = "";
                videoDevices.forEach((device, index) => {
                    const option = document.createElement("option");
                    option.value = device.deviceId;
                    
                    // Store facing information in data attribute for accurate fallback switching
                    const label = device.label.toLowerCase();
                    if (label.includes("back") || label.includes("rear") || label.includes("environment")) {
                        option.setAttribute("data-facing", "environment");
                    } else {
                        option.setAttribute("data-facing", "user");
                    }

                    option.text = device.label || `Camera ${index + 1}`;
                    cameraSelect.appendChild(option);
                });

                if (videoDevices.length > 0) {
                    await startSelectedCamera();
                }
            } catch (err) {
                console.error("Error listing cameras:", err);
                // Fallback options if enumerateDevices is blocked
                cameraSelect.innerHTML = `
                    <option value="user" data-facing="user">Front Camera</option>
                    <option value="environment" data-facing="environment">Rear Camera</option>
                `;
                await startSelectedCamera();
            }
        }

        async function startSelectedCamera() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
            
            video.srcObject = null;

            const selectedOption = cameraSelect.options[cameraSelect.selectedIndex];
            if (!selectedOption) return;

            const deviceId = selectedOption.value;
            const facingMode = selectedOption.getAttribute("data-facing");

            // Multi-stage robust constraints to prevent mobile browser deviceId bugs
            let constraints = {
                audio: false,
                video: { deviceId: { exact: deviceId } }
            };

            // If it's a generic fallback value
            if (deviceId === "user" || deviceId === "environment") {
                constraints.video = { facingMode: { ideal: deviceId } };
            }

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            } catch (err) {
                console.warn("Primary deviceId constraint failed. Trying facingMode fallback...", err);
                try {
                    // Fallback using explicit facingMode instead of deviceId
                    currentStream = await navigator.mediaDevices.getUserMedia({
                        audio: false,
                        video: { facingMode: { ideal: facingMode } }
                    });
                } catch (fallbackErr) {
                    console.error("All constraints failed. Using default camera.", fallbackErr);
                    currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                }
            }

            video.srcObject = currentStream;
            
            await new Promise((resolve) => {
                video.onloadedmetadata = () => resolve();
            });

            await video.play();

            // Handle mirror styling dynamically based on the track configuration
            const activeTrack = currentStream.getVideoTracks()[0];
            const settings = activeTrack.getSettings ? activeTrack.getSettings() : {};
            const actualFacing = settings.facingMode || facingMode;

            if (actualFacing === "user") {
                video.classList.add("mirror");
            } else {
                video.classList.remove("mirror");
            }

            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;

            detect();
        }

        function estimateHeight(keypoints) {
            const videoH = video.videoHeight || 480;
            const getPt = (idx) => {
                const kp = keypoints[idx];
                if (!kp) return null;
                const score = kp.score !== undefined ? kp.score : 0.5;
                return score > 0.10 ? { x: kp.x, y: (kp.y <= 1 ? kp.y * videoH : kp.y) } : null;
            };

            const nose = getPt(0);
            const leftEye = getPt(1);
            const rightEye = getPt(2);
            const leftShoulder = getPt(11);
            const rightShoulder = getPt(12);
            const leftHip = getPt(23);
            const rightHip = getPt(24);
            const leftAnkle = getPt(27);
            const rightAnkle = getPt(28);

            if (nose && leftAnkle && rightAnkle) {
                const ankleY = (leftAnkle.y + rightAnkle.y) / 2;
                const pixelHeight = ankleY - nose.y;
                if (pixelHeight > 30) return Math.round(pixelHeight * 0.38);
            }

            if (nose && leftHip && rightHip) {
                const hipY = (leftHip.y + rightHip.y) / 2;
                const noseToHip = hipY - nose.y;
                if (noseToHip > 20) return Math.round((noseToHip * 2.3) * 0.38);
            }

            if ((nose || leftEye || rightEye) && leftShoulder && rightShoulder) {
                const topY = nose ? nose.y : (leftEye.y + rightEye.y) / 2;
                const shoulderY = (leftShoulder.y + rightShoulder.y) / 2;
                const headToShoulder = shoulderY - topY;
                if (headToShoulder > 5) {
                    return Math.round((headToShoulder * 7.2) * 0.38);
                }
            }
            return null;
        }

        function estimateWeight(height) {
            if (!height || height < 100) return 0;
            const targetBmi = 22.0; 
            const meters = height / 100;
            return Math.round(targetBmi * (meters * meters));
        }

        function drawPoint(x, y) {
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, 2 * Math.PI);
            ctx.fillStyle = "red";
            ctx.fill();
        }

        function drawLine(a, b) {
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.lineWidth = 2;
            ctx.strokeStyle = "lime";
            ctx.stroke();
        }

        function drawSkeleton(pose) {
            const points = pose.keypoints;
            const isMirrored = video.classList.contains("mirror");

            points.forEach(point => {
                const score = point.score !== undefined ? point.score : 0.5;
                if (score > 0.10) {
                    let drawX = point.x <= 1 ? point.x * canvas.width : point.x;
                    let drawY = point.y <= 1 ? point.y * canvas.height : point.y;
                    if (isMirrored) {
                        drawX = canvas.width - drawX;
                    }
                    drawPoint(drawX, drawY);
                }
            });

            const pairs = [
                [11, 12], [11, 13], [13, 15], [12, 14], [14, 16],
                [11, 23], [12, 24], [23, 24], [23, 25], [25, 27],
                [24, 26], [26, 28]
            ];

            pairs.forEach(pair => {
                const a = points[pair[0]];
                const b = points[pair[1]];
                if (a && b) {
                    const aScore = a.score !== undefined ? a.score : 0.5;
                    const bScore = b.score !== undefined ? b.score : 0.5;
                    if (aScore > 0.10 && bScore > 0.10) {
                        let ax = a.x <= 1 ? a.x * canvas.width : a.x;
                        let ay = a.y <= 1 ? a.y * canvas.height : a.y;
                        let bx = b.x <= 1 ? b.x * canvas.width : b.x;
                        let by = b.y <= 1 ? b.y * canvas.height : b.y;

                        if (isMirrored) {
                            ax = canvas.width - ax;
                            bx = canvas.width - bx;
                        }
                        drawLine({x: ax, y: ay}, {x: bx, y: by});
                    }
                }
            });
        }

        async function detect() {
            if (video.readyState < 2) {
                animationFrameId = requestAnimationFrame(detect);
                return;
            }

            try {
                if (detector) {
                    const poses = await detector.estimatePoses(video);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    if (poses && poses.length > 0) {
                        const pose = poses[0];
                        drawSkeleton(pose);

                        document.getElementById("personStatus").innerText = "Person Detected";
                        let height = estimateHeight(pose.keypoints);

                        if (height && height >= 90 && height <= 240) {
                            const weight = estimateWeight(height);
                            const meters = height / 100;
                            const bmiValue = (weight / (meters * meters)).toFixed(1);

                            document.getElementById("height").innerText = height + " cm";
                            document.getElementById("weight").innerText = weight + " kg";
                            document.getElementById("bmi").innerText = bmiValue;
                        } else {
                            document.getElementById("height").innerText = "--";
                            document.getElementById("weight").innerText = "--";
                            document.getElementById("bmi").innerText = "--";
                        }
                    } else {
                        document.getElementById("personStatus").innerText = "No Person Detected";
                        document.getElementById("height").innerText = "--";
                        document.getElementById("weight").innerText = "--";
                        document.getElementById("bmi").innerText = "--";
                    }
                }
            } catch (err) {
                console.error("Detection error:", err);
            }

            animationFrameId = requestAnimationFrame(detect);
        }

        initSystem();
    </script>
</body>
</html>
